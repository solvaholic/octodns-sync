name: Create a draft release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to create, for example 3.2.0'
        required: true

defaults:
  run:
    shell: bash

jobs:
  create-release:
    name: Create draft release
    environment: uses-pat
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v4

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          _ver="${{ github.event.inputs.version }}"
          _tag="v${_ver}"
          _branch="release-${_ver}"

          # Create release branch from current ref
          git checkout -b "${_branch}"
          git push origin "${_branch}"

          # Create the draft release targeting the release branch
          gh release create "${_tag}" \
            --target "${_branch}" \
            --title "octodns-sync ${_tag}" \
            --notes "See [CHANGELOG.md](docs/CHANGELOG.md) for details." \
            --draft
